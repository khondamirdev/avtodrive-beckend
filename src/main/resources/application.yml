spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/avtodrivepro
    username: postgres
    password: 1111
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

  data:
    jpa:
      repositories:
        bootstrap-mode: default

server:
  port: 8081

jwt:
  secret: avtodrivepro-super-secret-key-min-256-bit-long-key-here-12345
  expiration: 3600000